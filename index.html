<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lanka | Elite District Explorer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');

        :root {
            --bg: #05070a;
            --card-bg: rgba(13, 17, 23, 0.7);
            --accent: #38bdf8;
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(251, 146, 60, 0.05) 0%, transparent 30%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #map-tooltip {
            position: fixed;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 8px;
            font-size: 0.8rem;
            pointer-events: none;
            display: none;
            z-index: 1000;
            border: 1px solid var(--accent);
            backdrop-filter: blur(5px);
            font-weight: 600;
        }

        .map-section {
            flex: 1.4;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 5vh;
            position: relative;
        }

        #map {
            height: 70vh !important;
            width: auto !important;
            filter: drop-shadow(0 0 30px rgba(56, 189, 248, 0.15));
            transition: transform 0.5s ease;
            transform: scale(0.9);
        }

        .info-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 40px;
            background: linear-gradient(90deg, rgba(5, 7, 10, 0.8) 0%, transparent 100%);
            z-index: 2;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 48px;
            padding: 60px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .label-top {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
            opacity: 0.6;
        }

        #district-name {
            font-size: 3.5rem;
            margin: 0 0 40px 0;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.3s ease;
        }

        #shape-container {
            width: 320px;
            height: 320px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 48px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        #district-shape-svg {
            width: 85%;
            height: 85%;
        }

        .visual-hint {
            margin-top: 40px;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 600;
            letter-spacing: 2px;
            border: 1px solid var(--glass-border);
            padding: 8px 20px;
            border-radius: 100px;
            display: inline-block;
        }

        path {
            transition: fill 0.3s ease, opacity 0.3s ease;
            cursor: pointer;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
</head>

<body>

    <div id="map-tooltip">District Name</div>

    <div class="map-section">
        <div id="map"></div>
    </div>

    <div class="info-section">
        <div class="main-card">
            <span class="label-top">Selected District</span>
            <h2 id="district-name">Island</h2>

            <div id="shape-container">
                <div id="district-shape-svg"></div>
            </div>

            <div class="visual-hint">
                VECTOR GEO-DATA
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
